# Workflow derived from https://github.com/r-lib/actions/tree/v2-branch/examples
# Need help debugging build failures?
# https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::xml2
          needs: coverage

      - name: Test coverage
        env:
          SG_REST_API: ${{ secrets.SG_REST_API || '' }}
          SG_USER: ${{ secrets.SG_USER || '' }}
          SG_PASS: ${{ secrets.SG_PASS || '' }}
          ALCHEMER_API_SECRET: ${{ secrets.ALCHEMER_API_SECRET || '' }}
          ALCHEMER_API_KEY: ${{ secrets.ALCHEMER_API_KEY || '' }}
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(
              normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"),
              "package"
            )
          )

          print(cov)
          covr::to_cobertura(cov, filename = "cobertura.xml")
        shell: Rscript {0}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          # Fail on upload errors for push events. For pull requests,
          # fail only when a Codecov token is available.
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN != '' }}
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' \
            -name 'testthat.Rout*' \
            -exec cat '{}' \; || true
        shell: bash

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
          if-no-files-found: ignore