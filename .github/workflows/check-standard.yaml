# Workflow derived from:
# https://github.com/r-lib/actions/tree/v2/examples
#
# Help debugging failures:
# https://github.com/r-lib/actions#where-to-find-help

name: R-CMD-check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions: read-all

jobs:
  R-CMD-check:
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - os: macos-latest
            r: release

          - os: windows-latest
            r: release

          - os: ubuntu-latest
            r: release

          - os: ubuntu-latest
            r: oldrel-1

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        env:
          SG_REST_API: ${{ secrets.SG_REST_API }}
          SG_USER: ${{ secrets.SG_USER }}
          SG_PASS: ${{ secrets.SG_PASS }}
          ALCHEMER_API_SECRET: ${{ secrets.ALCHEMER_API_SECRET }}
          ALCHEMER_API_KEY: ${{ secrets.ALCHEMER_API_KEY }}
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'